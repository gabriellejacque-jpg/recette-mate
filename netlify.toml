# Déploiement complet sur Netlify : front statique (dist/) + API en fonction
# serverless (netlify/functions/api) + données dans Netlify Blobs. Voir DEPLOY.md.

[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

# Les appels du front vers /api/* sont routés vers la fonction.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# Tout le reste est servi par le front (SPA).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
